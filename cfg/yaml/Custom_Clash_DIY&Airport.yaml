rule-providers:
  Custom_Direct_Domain:
    type: http
    behavior: domain
    format: mrs
    url: https://gcore.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.mrs
    interval: 900
  Custom_Direct_IP:
    type: http
    behavior: ipcidr
    format: mrs
    url: https://gcore.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_IP.mrs
    interval: 900
  Custom_Direct_Port:
    type: http
    behavior: classical
    format: yaml
    url: https://gcore.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_Port.yaml
    interval: 900
  Custom_Proxy_Domain:
    type: http
    behavior: domain
    format: mrs
    url: https://gcore.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.mrs
    interval: 900
  Custom_Proxy_IP:
    type: http
    behavior: ipcidr
    format: mrs
    url: https://gcore.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_IP.mrs
    interval: 900
  Steam_CDN_Domain:
    type: http
    behavior: domain
    format: mrs
    url: https://gcore.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Steam_CDN_Domain.mrs
    interval: 900
  Steam_CDN_IP:
    type: http
    behavior: ipcidr
    format: mrs
    url: https://gcore.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Steam_CDN_IP.mrs
    interval: 900
  Encrypted_DNS_IP:
    type: http
    behavior: ipcidr
    format: mrs
    url: https://gcore.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Encrypted_DNS_IP.mrs
    interval: 900
  Custom_Port_Direct:
    type: http
    behavior: classical
    url: https://gcore.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Port_Direct.yaml
    interval: 900
  rule_direct_domain:
    type: inline
    behavior: domain
    payload:
      # 自己需要补充其他需要直连的域名
      # - '+.example.com'
  rule_direct_ip:
    type: inline
    behavior: ipcidr
    payload:
      # 自己需要补充其他需要直连的 IP
      - '123.123.123.123/32'
  rule_direct_classical:
    type: inline
    behavior: classical
    payload:
      # 自己需要补充其他直连规则
