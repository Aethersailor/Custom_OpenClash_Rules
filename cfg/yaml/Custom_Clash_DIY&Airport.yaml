rules:
  - GEOSITE,private,全球直连
  - GEOIP,private,全球直连,no-resolve
  - DST-PORT,853,REJECT # 阻断 DOT 连接
  - GEOSITE,category-doh,REJECT # 阻断域名类 DOH 连接
  - RULE-SET,Encrypted_DNS_IP,REJECT,no-resolve # 阻断海外 IP 类 DOH 连接
  - RULE-SET,rule_direct_domain,全球直连
  - RULE-SET,rule_direct_ip,全球直连,no-resolve
  - RULE-SET,rule_direct_classical,全球直连
  - RULE-SET,Custom_Direct_Domain,全球直连
  - RULE-SET,Custom_Direct_IP,全球直连,no-resolve
