# Custom_Clash_DIY&Airport.yaml

# 适用环境：优质线路全解锁自建节点 + 故障转移备用机场
# 主要规则基于 GeoSite + GeoIP，补充规则来自本项目仓库


# 仅提供代理组、策略组等参数内容
# DNS、IPv6 等参数不做配置，请根据自己实际情况，使用客户端覆写功能添加，或手动填写
# 可搭配本项目 wiki 中的设置教程使用

# 不要启用 fallback 服务器！！
# 本配置文件默认阻断所有海外加密 DNS 连接，以配合自建节点的 DNS 解锁功能
# 在 OpenClash 下使用务必开启绕过中国大陆功能，否则将无法使用国内 DOH 服务器

# 遵循 mihomo 官方配置范例格式，如需修改，请参考官方完整配置范例

# 使用机器人自行添加冷门直连域名：https://t.me/asailor_rulebot

port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

proxy-providers:
# 机场订阅
  Airport:
    type: http
    url: 填写你的机场订阅地址
    interval: 1800
    # 若无法直连拉取，则删去下方 proxy: DIRECT
    proxy: DIRECT
    path: ./proxy_provider/Airport.yaml
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 120
    override:
      skip-cert-verify: false
      udp: true

# 自建节点
# 我使用 substore 下发自建节点的订阅信息，你也可以手动填写节点参数
  Private:
    type: http
    url: 填写你的自建节点订阅地址
    interval: 1800
    proxy: DIRECT
    path: ./proxy_provider/Private.yaml
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300

# 线路优先原则：一切分流优先走自建节点，并在自建节点上完成全部解锁
# 若自建节点不可用，则根据线路可用性，按照特定地区顺序自动回落机场对应的节点分组
# 媒体类分流优先新加坡区，其余分流优先港区
# 默认使用 fallback + urltest，如需使用 smart，请启用覆写设置中 smart 替换 urltest 的功能

