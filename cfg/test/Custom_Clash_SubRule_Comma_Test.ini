;Custom_OpenClash_Rules
;SubConverter-Extended SUB-RULE comma payload regression test
;Used to verify Mihomo rules whose payload contains commas.

[custom]
; Expected generated rules:
; - SUB-RULE,(NETWORK,UDP),udp-route
; - AND,((DOMAIN,example.com),(NETWORK,UDP)),🧩 逻辑规则
; - DOMAIN-REGEX,^foo,bar\.example$,🧪 正则逗号
; - IP-CIDR,1.1.1.1/32,🎯 全球直连,no-resolve
; - MATCH,🐟 漏网之鱼
ruleset=udp-route,[]SUB-RULE,(NETWORK,UDP)
ruleset=🧩 逻辑规则,[]AND,((DOMAIN,example.com),(NETWORK,UDP))
ruleset=🧪 正则逗号,[]DOMAIN-REGEX,^foo,bar\.example$
ruleset=🎯 全球直连,[]IP-CIDR,1.1.1.1/32,no-resolve
ruleset=🐟 漏网之鱼,[]FINAL

custom_proxy_group=🚀 手动选择`select`.*
custom_proxy_group=🧩 逻辑规则`select`[]🚀 手动选择`[]🎯 全球直连
custom_proxy_group=🧪 正则逗号`select`[]🚀 手动选择`[]🎯 全球直连
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 手动选择`[]🎯 全球直连
custom_proxy_group=🎯 全球直连`select`[]DIRECT

enable_rule_generator=true
overwrite_original_rules=true
clash_rule_base=https://raw.githubusercontent.com/Aethersailor/Custom_OpenClash_Rules/main/cfg/test/Custom_Clash_SubRule_Comma_Base.yaml
