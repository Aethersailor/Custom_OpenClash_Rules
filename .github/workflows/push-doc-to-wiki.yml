name: Sync doc to Wiki

on:
  workflow_dispatch:
  push:
    paths:
      - 'doc/**'

permissions:
  contents: write

env:
  TARGET_BRANCH: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.head_branch) || ((github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref_name) || (vars.WORK_BRANCH != '' && vars.WORK_BRANCH) || 'main' }}

jobs:
  sync-to-wiki:
    if: github.repository == 'Aethersailor/Custom_OpenClash_Rules' && (github.event_name != 'push' || github.ref_name == ((vars.WORK_BRANCH != '' && vars.WORK_BRANCH) || 'main'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout working repository branch
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Clone wiki repository with auth
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.wiki.git _wiki

      - name: Prepare doc directory in wiki repository
        run: |
          mkdir -p _wiki/doc
          find _wiki/doc -mindepth 1 -not -name README.md -exec rm -rf {} +

      - name: Sync main repo's doc to wiki repository
        run: |
          rsync -av --exclude 'README.md' doc/ _wiki/doc/

      - name: Commit and push changes to wiki
        run: |
          cd _wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add doc

          if ! git diff --cached --quiet; then
            git commit -m "Sync doc from main repository"
            git push
          fi
