name: Sync doc to Wiki

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'doc/**'

permissions:
  actions: write
  contents: write

jobs:
  sync-to-wiki:
    if: github.repository == 'Aethersailor/Custom_OpenClash_Rules'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: main
          fetch-depth: 0

      - name: Clone wiki repository with auth
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.wiki.git" _wiki

      - name: Prepare doc directory in wiki repository
        run: |
          mkdir -p _wiki/doc
          find _wiki/doc -mindepth 1 -not -name README.md -exec rm -rf {} +

      - name: Sync main repo's doc to wiki repository
        run: |
          rsync -av --exclude 'README.md' doc/ _wiki/doc/

      - name: Commit and push changes to wiki
        run: |
          cd _wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add doc

          if ! git diff --cached --quiet; then
            git commit -m "Sync doc from main repository"
            git push
            # 立即把更新后的 Wiki 回写到主仓库，并由备份工作流部署 Pages。
            gh workflow run auto-backup-wiki.yml --ref main
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
