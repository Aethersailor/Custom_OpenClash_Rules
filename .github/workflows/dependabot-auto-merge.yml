name: Dependabot auto-merge

on:
  workflow_run:
    workflows:
      - CodeQL Advanced
      - Validate repository
    types: [completed]

permissions:
  actions: read
  checks: read
  contents: read
  pull-requests: read

concurrency:
  group: dependabot-automerge-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  merge:
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Merge after required checks pass
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const run = context.payload.workflow_run;
            const prSummary = run.pull_requests?.[0];
            if (!prSummary) {
              core.info("The completed workflow is not associated with a pull request.");
              return;
            }

            const { owner, repo } = context.repo;
            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prSummary.number,
            });
            const labels = pr.labels.map((label) => label.name);
            const isCodeqlUpdate = pr.head.ref.startsWith(
              "dependabot/github_actions/github/codeql-action/"
            );
            if (
              pr.user.login !== "dependabot[bot]" ||
              (!labels.includes("automerge") && !isCodeqlUpdate)
            ) {
              core.info(`PR #${pr.number} is not eligible for automatic merge.`);
              return;
            }
            if (pr.state !== "open" || pr.head.sha !== run.head_sha) {
              core.info(`PR #${pr.number} is closed or no longer points at ${run.head_sha}.`);
              return;
            }

            const requiredChecks = new Set([
              "Analyze (actions)",
              "Analyze (python)",
              "validate",
            ]);
            const { data } = await github.rest.checks.listForRef({
              owner,
              repo,
              ref: pr.head.sha,
              filter: "latest",
              per_page: 100,
            });
            const checks = new Map(
              data.check_runs
                .filter((check) => requiredChecks.has(check.name))
                .map((check) => [check.name, check])
            );
            const missing = [...requiredChecks].filter((name) => !checks.has(name));
            const pending = [...checks.values()].filter((check) => check.status !== "completed");
            if (missing.length > 0 || pending.length > 0) {
              core.info(
                `Waiting for checks. Missing: ${missing.join(", ") || "none"}; pending: ${pending.map((check) => check.name).join(", ") || "none"}`
              );
              return;
            }

            const failed = [...checks.values()].filter(
              (check) => check.conclusion !== "success"
            );
            if (failed.length > 0) {
              core.setFailed(
                `Required checks failed: ${failed.map((check) => `${check.name}=${check.conclusion}`).join(", ")}`
              );
              return;
            }

            const { data: result } = await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: pr.number,
              merge_method: "squash",
              sha: pr.head.sha,
            });
            if (!result.merged) {
              core.setFailed(result.message || "GitHub did not merge the pull request.");
            }
