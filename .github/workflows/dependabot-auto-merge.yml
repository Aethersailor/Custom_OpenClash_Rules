name: Dependabot auto-merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, labeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  enable-automerge:
    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      (
        contains(github.event.pull_request.labels.*.name, 'automerge') ||
        startsWith(github.event.pull_request.head.ref, 'dependabot/github_actions/github/codeql-action/')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Wait for checks and merge
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.DEPENDABOT_AUTOMERGE_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;
            const requiredChecks = new Set([
              "Analyze (actions)",
              "Analyze (python)",
              "validate",
            ]);

            for (let attempt = 1; attempt <= 80; attempt++) {
              const { data } = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: pr.head.sha,
                filter: "latest",
                per_page: 100,
              });
              const checks = new Map(
                data.check_runs
                  .filter((check) => requiredChecks.has(check.name))
                  .map((check) => [check.name, check])
              );
              const failed = [...checks.values()].filter(
                (check) => check.status === "completed" && check.conclusion !== "success"
              );
              if (failed.length > 0) {
                core.setFailed(
                  `Required checks failed: ${failed.map((check) => `${check.name}=${check.conclusion}`).join(", ")}`
                );
                return;
              }

              const missing = [...requiredChecks].filter((name) => !checks.has(name));
              const pending = [...checks.values()].filter((check) => check.status !== "completed");
              if (missing.length === 0 && pending.length === 0) {
                break;
              }
              if (attempt === 80) {
                core.setFailed(
                  `Timed out waiting for checks. Missing: ${missing.join(", ") || "none"}; pending: ${pending.map((check) => check.name).join(", ") || "none"}`
                );
                return;
              }
              await new Promise((resolve) => setTimeout(resolve, 15000));
            }

            const { data: current } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pr.number,
            });
            if (current.state !== "open" || current.head.sha !== pr.head.sha) {
              core.setFailed("Pull request changed while checks were running; refusing a stale merge.");
              return;
            }

            const { data: result } = await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: pr.number,
              merge_method: "squash",
              sha: pr.head.sha,
            });
            if (!result.merged) {
              core.setFailed(result.message || "GitHub did not merge the pull request.");
            }
