name: Auto update mainland config

on:
  push:
    paths:
      - cfg/Custom_Clash.ini
  workflow_dispatch:

permissions:
  contents: write

env:
  TARGET_BRANCH: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.head_branch) || ((github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref_name) || (vars.WORK_BRANCH != '' && vars.WORK_BRANCH) || 'main' }}

jobs:
  update-mainland:
    if: github.event_name != 'push' || github.ref_name == ((vars.WORK_BRANCH != '' && vars.WORK_BRANCH) || 'main')
    runs-on: ubuntu-latest
    steps:
    - name: Check out the repository
      uses: actions/checkout@v6
      with:
        ref: main
        fetch-depth: 0

    - name: Generate Custom_Clash_Mainland.ini
      run: cp -f cfg/Custom_Clash.ini cfg/Custom_Clash_Mainland.ini

    - name: Commit and push changes
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add cfg/Custom_Clash_Mainland.ini

        # 判断是否有变更，只有在有变更时才提交
        if ! git diff --cached --quiet; then
          git commit -m "chore: update Custom_Clash_Mainland.ini based on Custom_Clash.ini"
          if git ls-remote --exit-code --heads origin main > /dev/null 2>&1; then
            git pull --rebase origin main
          fi
          git push origin HEAD:main
        else
          echo "No changes to commit."
        fi
