name: Refresh contributors image

on:
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Refresh contrib.rocks cache
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail

          canonical_repo="Aethersailor/Custom_OpenClash_Rules"
          mixed_case_repo="$(REPO="$canonical_repo" RUN_ID="$RUN_ID" python3 - <<'PY'
          import hashlib
          import os

          repo = os.environ["REPO"]
          bits = bin(int(hashlib.sha256(os.environ["RUN_ID"].encode()).hexdigest(), 16))[2:].zfill(256)
          result = []
          index = 0
          for char in repo:
              if char.isalpha():
                  result.append(char.upper() if bits[index] == "1" else char.lower())
                  index += 1
              else:
                  result.append(char)
          print("".join(result))
          PY
          )"

          image_url="https://contrib.rocks/image?repo=${mixed_case_repo}&anon=1&max=100"
          curl --fail --silent --show-error --retry 3 "$image_url" --output contributors.svg

          expected_count="$(gh api --paginate \
            "repos/${canonical_repo}/contributors?anon=1&per_page=100" \
            --jq '[.[] | select(.type != "Bot")] | length' \
            | awk '{ total += $1 } END { print total + 0 }')"
          actual_count="$(grep -o '<title>[^<]*</title>' contributors.svg | wc -l | tr -d ' ')"

          echo "GitHub non-bot contributors: ${expected_count}"
          echo "contrib.rocks rendered contributors: ${actual_count}"
          test "$actual_count" -eq "$expected_count"
