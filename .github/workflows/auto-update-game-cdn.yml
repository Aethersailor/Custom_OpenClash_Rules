name: Auto Update Game CDN Rules

on:
  schedule:
    # 每天北京时间 10:13 运行（UTC 02:13）
    - cron: '13 2 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  actions: write
  contents: write

concurrency:
  group: main-writers

jobs:
  update-game-cdn:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout main branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: main
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.13'
      
      - name: Generate Game_Download_CDN.list
        run: |
          echo "::group::Running generation script"
          python -m unittest discover -s py -p 'test_*.py'
          python py/generate_game_cdn.py
          python py/generate_game_cdn.py --check
          echo "::endgroup::"

      - name: Commit and push validated changes
        id: publish
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Rebuild from the latest main if another writer completed while the
          # upstream data was being downloaded. Never rebase generated output.
          git fetch origin main
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            git reset --hard origin/main
            python -m unittest discover -s py -p 'test_*.py'
            python py/generate_game_cdn.py
            python py/generate_game_cdn.py --check
          fi

          if ! git diff --quiet -- . ':(exclude)rule/Game_Download_CDN.list'; then
            echo "Game CDN updater modified unexpected files." >&2
            git status --short
            exit 1
          fi

          git add rule/Game_Download_CDN.list
          if git diff --cached --quiet; then
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "Game_Download_CDN.list is already up to date."
            exit 0
          fi

          git commit -m "chore(rule): auto-update Game_Download_CDN.list from upstream"
          git push origin HEAD:main
          echo "published=true" >> "$GITHUB_OUTPUT"

      - name: Purge jsDelivr cache after update
        if: steps.publish.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run purge-jsdelivr.yml --repo "${GITHUB_REPOSITORY}" --ref main
