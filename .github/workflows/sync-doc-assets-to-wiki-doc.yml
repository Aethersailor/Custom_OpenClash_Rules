name: Sync doc assets to wiki/doc

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'doc/**'

permissions:
  actions: write
  contents: write

concurrency:
  group: main-writers

jobs:
  sync-doc-assets:
    if: github.repository == 'Aethersailor/Custom_OpenClash_Rules'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          fetch-depth: 0

      - name: Sync doc assets into wiki/doc
        run: |
          mkdir -p wiki/doc
          rsync -av --delete --exclude '*.md' doc/ wiki/doc/

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wiki/doc

          if ! git diff --cached --quiet; then
            git commit -m "chore(doc): sync doc assets to wiki"
            git pull --rebase origin main
            git push origin HEAD:main
            gh workflow run pages.yml --ref main
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
