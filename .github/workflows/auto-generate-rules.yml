name: Auto generate rules

on:
  push:
    branches:
      - main
    paths:
      - 'rule/Custom_Direct.list'
      - 'rule/Custom_Proxy.list'
      - 'rule/Steam_CDN.list'
      - 'rule/Encrypted_DNS.list'
      - 'py/generate_rules.py'
  workflow_dispatch:

permissions:
  contents: write

# All workflows that commit to main share this queue to avoid push races.
concurrency:
  group: main-writers

jobs:
  generate-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout latest main branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'

      - name: Download and verify Mihomo
        env:
          MIHOMO_VERSION: v1.19.18
          MIHOMO_SHA256: bbad6c9fa6322d870e94aab34b54097ffc880829be8fd804de79543d87f1f8e5
        run: |
          archive="mihomo-linux-amd64-${MIHOMO_VERSION}.gz"
          wget -q "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/${archive}"
          printf '%s  %s\n' "$MIHOMO_SHA256" "$archive" | sha256sum --check --strict
          gunzip "$archive"
          install -m 0755 "${archive%.gz}" "$RUNNER_TEMP/mihomo"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Generate YAML and MRS providers
        run: python py/generate_rules.py --mihomo mihomo

      - name: Test generation and conversion logic
        run: |
          python -m unittest discover -s tests -v
          python py/generate_rules.py --check --mihomo mihomo

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Rule-Bot may push while this job is running. Regenerate from the
          # newest source instead of rebasing stale derived files over it.
          git fetch origin main
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            git reset --hard origin/main
            python py/generate_rules.py --mihomo mihomo
            python py/generate_rules.py --check --mihomo mihomo
          fi

          git add -- rule/*.yaml rule/*.mrs

          if git diff --cached --quiet; then
            echo "No generated rule changes, skip commit and push."
            exit 0
          fi

          git commit -m "chore(rules): auto generate derived rule files"
          git push origin HEAD:main
