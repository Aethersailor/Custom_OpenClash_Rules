name: 💡 项目功能建议
description: 对规则资源、YAML、覆写模块、自动生成流程或文档体系提出通用改进建议
title: "[功能建议] "
labels: ["enhancement"]
assignees: []

body:
  - type: checkboxes
    id: precheck
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issues、Pull Requests 和仓库内容，确认没有相同功能
          required: true
        - label: 此建议属于本项目维护范围，而不是 OpenClash、Mihomo 或转换后端自身的功能请求
          required: true
        - label: 此建议不是要求维护者提供私人配置、节点、订阅服务或一对一技术支持
          required: true

  - type: dropdown
    id: area
    attributes:
      label: 建议涉及的范围
      options:
        - 规则源文件与派生格式
        - 订阅转换模板（INI）
        - YAML 配置示例
        - 覆写模块
        - 自动化、校验或生成流程
        - README / Wiki 文档体系
        - 仓库使用体验
        - 其他
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 描述当前限制、使用痛点或容易出错的流程，避免只写功能名称。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 说明希望新增或改变什么，以及用户将如何使用。
    validations:
      required: true

  - type: textarea
    id: value
    attributes:
      label: 普遍价值
      description: 说明受益用户、典型场景，以及为何适合由本项目长期维护。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
      description: 说明目前可以如何绕过，以及这些方案为何不足。
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: 参考资料或实现线索
      description: 可提供上游代码、官方文档、示例配置、相关项目或初步实现。
    validations:
      required: false
