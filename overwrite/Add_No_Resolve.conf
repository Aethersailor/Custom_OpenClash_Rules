[Overwrite]
# Name: Add No Resolve
# Author: Aethersailor
# Project: Custom_OpenClash_Rules
# Description: 为目标 IP 类规则及 ipcidr Rule Provider 引用规则添加 no-resolve
# Compatibility: 需 OpenClash 支持 [Overwrite] 与 ruby_edit，Mihomo 支持 no-resolve
# Action: 在 OpenClash 生成最终配置后遍历 rules 与 sub-rules，并按规则类型进行改写
# Conflicts: 会阻止相关规则为域名连接主动触发 DNS 解析，可能改变依赖解析后 IP 命中的分流结果
# Verification: 在最终运行配置中检查目标规则是否已在策略后添加 no-resolve
#
# 功能：
# 1. 为 IP-CIDR、IP-CIDR6 和 GEOIP 目标 IP 规则添加 no-resolve
# 2. 为引用 behavior: ipcidr Rule Provider 的 RULE-SET 规则添加 no-resolve
# 3. 同时处理顶层 rules 与 sub-rules 中的直接规则
# 4. 已包含 no-resolve 或 src 参数的规则保持不变
# 5. 保留规则顺序、策略及其他附加参数
#
# 限制：
# - 不修改 Rule Provider 文件内部的规则内容
# - 不处理 behavior: domain 或 behavior: classical 的 Rule Provider
# - 不解析 AND、OR、NOT 等逻辑规则内部嵌套的 IP 规则
# - 不处理 IP-ASN、IP-SUFFIX、SRC-IP-CIDR 或 SRC-GEOIP
# - no-resolve 只阻止当前规则主动触发 DNS 解析；如更早的规则已经完成解析，仍可使用解析结果匹配
# - 配置文件需要包含有效的 rules 数组

ruby_edit "$CONFIG_FILE" "['rules']" "begin; add_no_resolve = lambda { |rule_list| next rule_list unless rule_list.is_a?(Array); rule_list.map { |rule| next rule unless rule.is_a?(String); parts = rule.split(',').map(&:strip); next rule if parts.length < 3; options = parts.drop(3).map { |part| part.downcase }; next rule if options.include?('no-resolve') || options.include?('src'); rule_type = parts[0].to_s.upcase; needs_no_resolve = ['IP-CIDR', 'IP-CIDR6', 'GEOIP'].include?(rule_type); if rule_type == 'RULE-SET'; provider = (Value['rule-providers'] || {})[parts[1].to_s]; needs_no_resolve = provider.is_a?(Hash) && provider['behavior'].to_s.strip.downcase == 'ipcidr'; end; if needs_no_resolve; parts.insert(3, 'no-resolve'); parts.join(','); else; rule; end } }; if Value['sub-rules'].is_a?(Hash); Value['sub-rules'].each { |name, rule_list| Value['sub-rules'][name] = add_no_resolve.call(rule_list) }; end; add_no_resolve.call(Value['rules']) end"
