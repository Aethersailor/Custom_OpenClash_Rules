[YAML]
# OpenClash 覆写模块：阻断加密 DNS
# 阻断所有已知加密 DNS 的连接，强迫客户端回落 UDP/TCP DNS
# 
# 1. 阻断 TCP/UDP 目标端口 853（DoT / DoQ 标准端口）
# 2. 使用远程 MRS 规则集阻断已知加密 DNS 域名与 IP
# 3. 将阻断规则插入现有 rules 数组顶部，保留用户原有规则
# 4. 远程规则每日根据上游数据汇总并自动更新

rule-providers:
  Encrypted-DNS-Domain:
    type: http
    behavior: domain
    format: mrs
    url: https://cdn.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Encrypted_DNS_Domain.mrs
    path: ./rule_provider/Encrypted_DNS_Domain.mrs
    interval: 86400

  Encrypted-DNS-IP:
    type: http
    behavior: ipcidr
    format: mrs
    url: https://cdn.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Encrypted_DNS_IP.mrs
    path: ./rule_provider/Encrypted_DNS_IP.mrs
    interval: 86400

+rules:
  - DST-PORT,853,REJECT
  - RULE-SET,Encrypted-DNS-Domain,REJECT
  - RULE-SET,Encrypted-DNS-IP,REJECT,no-resolve