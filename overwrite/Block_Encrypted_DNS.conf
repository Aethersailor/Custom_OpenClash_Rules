[YAML]
# Name: Block Encrypted DNS
# Author: Aethersailor
# Project: Custom_OpenClash_Rules
# Description: 阻断标准端口及规则集已收录的加密 DNS 流量
# Compatibility: 需 OpenClash 支持 [YAML] 覆写块，Mihomo 支持 MRS Rule Provider
# Action: 添加两个远程 Rule Provider，并将阻断规则插入现有 rules 顶部
# Conflicts: 可能影响企业、校园、自建 DNS，以及主动使用 DoH / DoT / DoQ 的客户端
# Verification: 在最终运行配置中检查对应 Provider 与三条前置规则
#
# 功能：
# 1. 阻断 TCP/UDP 目标端口 853，即 DoT 与 DoQ 的标准端口
# 2. 阻断规则集已收录的加密 DNS 域名
# 3. 阻断规则集已收录的加密 DNS IP
# 4. 通过阻断加密 DNS 连接，防止客户端使用加密 DNS 绕过路由器的 DNS 服务，强迫客户端回落到 UDP/TCP DNS，确保 OpenClash 正常劫持 DNS 请求
# 5. 保留用户原有规则，不整体替换 rules 或 rule-providers
#
# 限制：
# - 无法保证阻断所有加密 DNS
# - 使用非标准端口、未知域名、共享 CDN IP、代理隧道或尚未收录目标的服务仍可能绕过
# - 本模块不负责 DNS 劫持、53 端口重定向、IPv6 防泄漏或防火墙配置
# - 远程规则每 24 小时检查一次更新

rule-providers:
  COCR-Encrypted-DNS-Domain:
    type: http
    behavior: domain
    format: mrs
    url: https://cdn.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Encrypted_DNS_Domain.mrs
    path: ./rule_provider/COCR_Encrypted_DNS_Domain.mrs
    interval: 86400

  COCR-Encrypted-DNS-IP:
    type: http
    behavior: ipcidr
    format: mrs
    url: https://cdn.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Encrypted_DNS_IP.mrs
    path: ./rule_provider/COCR_Encrypted_DNS_IP.mrs
    interval: 86400

+rules:
  - DST-PORT,853,REJECT
  - RULE-SET,COCR-Encrypted-DNS-Domain,REJECT
  - RULE-SET,COCR-Encrypted-DNS-IP,REJECT,no-resolve
