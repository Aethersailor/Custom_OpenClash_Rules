[General]
# Name: Set China IP Route URL
# Author: Aethersailor
# Project: Custom_OpenClash_Rules
# Description: 将大陆白名单的 IPv4 与 IPv6 数据源替换为项目指定来源
# Compatibility: 需 OpenClash 支持覆写模块的 CHNR_CUSTOM_URL 与 CHNR6_CUSTOM_URL 参数
# Action: 覆写 OpenClash 的 Chnroute IPv4/IPv6 下载地址，由插件生成 nftables 或 ipset 数据
# Conflicts: 会覆盖 OpenClash 页面中设置的大陆 IPv4 与 IPv6 白名单自定义下载地址
# Verification: 更新大陆白名单后，检查 OpenClash 日志中的 Chnroute 与 Chnroute6 下载结果
#
# 功能：
# 1. 将大陆 IPv4 白名单数据源替换为 Aethersailor/geoip 的 cn-ipv4.txt
# 2. 将大陆 IPv6 白名单数据源替换为 Aethersailor/geoip 的 cn-ipv6.txt
# 3. 同时作用于 OpenClash 启动时的数据检查和插件自身的定时更新流程
#
# 限制：
# - 不会自动开启“绕过中国大陆 IP”或“回国”模式
# - 不会自动启用大陆白名单的定时更新
# - 不修改配置文件中的 GEOIP、GeoSite、规则集或 Mihomo 的 geox-url
# - 数据源必须保持为每行一个合法 CIDR 的纯文本格式

CHNR_CUSTOM_URL = https://testingcf.jsdelivr.net/gh/Aethersailor/geoip@release/text/cn-ipv4.txt
CHNR6_CUSTOM_URL = https://testingcf.jsdelivr.net/gh/Aethersailor/geoip@release/text/cn-ipv6.txt
