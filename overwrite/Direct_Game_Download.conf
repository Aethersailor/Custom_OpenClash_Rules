[YAML]
# Name: Direct Game Download
# Author: Aethersailor
# Project: Custom_OpenClash_Rules
# Description: 将 Steam 下载 CDN 与各大游戏平台下载流量设为直连
# Compatibility: 需 OpenClash 支持 [YAML] 覆写块，Mihomo 支持 Rule Provider 与 GeoSite
# Action: 添加两个远程 Rule Provider，并将直连规则插入现有 rules 顶部
# Conflicts: 可能与用户已有的游戏下载分流规则重复，但不会整体覆盖现有配置
# Verification: 在最终运行配置中检查对应 Provider 与三条前置规则
#
# 功能：
# 1. 将本项目维护的 Steam 下载 CDN 域名设为直连
# 2. 将本项目维护的 Steam 下载 CDN IP 段设为直连
# 3. 将 GeoSite 的游戏平台下载分类设为直连
# 4. 保留用户原有规则，不整体替换 rules 或 rule-providers
#
# 限制：
# - 仅处理游戏下载与更新流量
# - 不会将游戏平台登录、商店、社区、云存档或联机流量全部直连
# - 依赖 Mihomo 的 GeoSite 数据包含 category-game-platforms-download
# - 远程规则每 8 小时检查一次更新

rule-providers:
  COCR-Steam-CDN-Domain:
    type: http
    behavior: domain
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Steam_CDN_Domain.yaml
    path: ./rule_provider/COCR_Steam_CDN_Domain.yaml
    interval: 28800

  COCR-Steam-CDN-IP:
    type: http
    behavior: ipcidr
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Steam_CDN_IP.yaml
    path: ./rule_provider/COCR_Steam_CDN_IP.yaml
    interval: 28800

+rules:
  - RULE-SET,COCR-Steam-CDN-Domain,DIRECT
  - RULE-SET,COCR-Steam-CDN-IP,DIRECT,no-resolve
  - GEOSITE,category-game-platforms-download,DIRECT
