[General]
# Name: Set GeoIP Database URL
# Author: Aethersailor
# Project: Custom_OpenClash_Rules
# Description: 将 GEOIP MMDB 与 GEOIP DAT 数据库地址替换为项目指定来源
# Compatibility: 需 OpenClash 支持覆写模块的 GEO_CUSTOM_URL 与 GEOIP_CUSTOM_URL 参数
# Action: 在启动阶段覆写 OpenClash 数据库地址，并由插件写入 Mihomo 的 geox-url 配置
# Conflicts: 会覆盖 OpenClash 页面或原配置中设置的 GEOIP MMDB 与 GEOIP DAT 下载地址
# Verification: 在最终运行配置的 geox-url 中检查 mmdb 与 geoip 地址
#
# 功能：
# 1. 将 GEOIP MMDB 数据库地址替换为 Aethersailor/geoip 的 Country.mmdb
# 2. 将 GEOIP DAT 数据库地址替换为 Aethersailor/geoip 的 geoip.dat
# 3. 同时作用于 OpenClash 启动时生成的运行配置和插件自身的数据库更新流程
#
# 限制：
# - 不会自动启用 GEOIP DAT 模式
# - 不会自动启用 MMDB 或 DAT 数据库的定时更新
# - 不修改 GeoSite、GeoASN 或其他 GEO 数据库地址

GEO_CUSTOM_URL = https://testingcf.jsdelivr.net/gh/Aethersailor/geoip@release/Country.mmdb
GEOIP_CUSTOM_URL = https://testingcf.jsdelivr.net/gh/Aethersailor/geoip@release/geoip.dat
